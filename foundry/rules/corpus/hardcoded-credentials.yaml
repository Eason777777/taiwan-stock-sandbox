id: CRED-001
name: Hardcoded Credentials
vulnerability_class: Hardcoded Credentials
cwe: CWE-798
severity_hint: critical
applicable_languages: [python, javascript, typescript, java, php, ruby, go, yaml, toml]
scope: function
prompt_template: |
  Analyze the following function for hardcoded credentials or secrets.
  Look for: string literals that look like passwords, API keys, tokens, private keys,
  or connection strings with embedded credentials. Ignore clearly fake/placeholder values
  like "changeme", "TODO", "your-secret-here", or values in comments marked as examples.
  A finding requires the credential to be functionally used (passed to an auth call, connection, header).

  Function:
  {{function_body}}

  Reply with JSON: {"vulnerable": true/false, "reason": "...", "credential_type": "...", "usage": "..."}
